<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Observe — Gaia</title>
<link rel="stylesheet" href="https://use.typekit.net/atn6inh.css">
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --olive:      #67765b;
  --paper-50:   #fefdf9;
  --ink-900:    #0d0c0d;
  --ink-400:    #524e56;
  --pw-600:     #dddbd3;
  --font-sans:  "neue-haas-unica","Neue Haas Unica","Helvetica Neue",system-ui,sans-serif;
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: #000;
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  user-select: none; -webkit-user-select: none;
}

#app {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  background: #000;
}

/* ── VIEWFINDER ───────────────────────────────────────── */
#viewfinder {
  flex: 1; min-height: 0;
  position: relative;
  overflow: hidden;
  background: #111;
}
#viewfinder video,
#viewfinder img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
/* Focus ring animation */
.focus-ring {
  position: absolute;
  width: 72px; height: 72px;
  border: 1.5px solid rgba(254,253,249,0.7);
  border-radius: 4px;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(1.3);
  opacity: 0;
  transition: none;
}
.focus-ring.animate {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
  transition: transform 0.25s cubic-bezier(0.32,0.72,0,1), opacity 0.15s ease;
}
.focus-ring.fade {
  opacity: 0;
  transition: opacity 0.4s ease 0.6s;
}

/* ── BOTTOM CONTROLS ──────────────────────────────────── */
#controls {
  flex-shrink: 0;
  background: var(--ink-900);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 48px;
  padding-bottom: max(32px, env(safe-area-inset-bottom, 32px));
}

#controls-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 340px;
}

/* Side buttons (Import / Audio) */
.ctrl-side {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding-top: 20px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-side-circle {
  width: 59.4px; height: 59.4px;
  border-radius: 180px;
  background: var(--ink-400);
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}
.ctrl-side-circle img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.ctrl-side-label {
  font-size: 13px;
  font-weight: 400;
  color: #fff;
  line-height: 1.2;
  letter-spacing: 0;
  white-space: nowrap;
  text-align: center;
}

/* ── SHUTTER BUTTON ───────────────────────────────────── */
.shutter-wrap {
  flex-shrink: 0;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.shutter-outer {
  width: 85px; height: 85px;
  border-radius: 236px;
  border: 2.833px solid var(--pw-600);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8.5px;
  transition: transform 0.12s ease;
}
.shutter-outer:active {
  transform: scale(0.92);
}
.shutter-inner {
  width: 68px; height: 68px;
  border-radius: 189px;
  background: var(--paper-50);
  flex-shrink: 0;
}

/* ── FLASH OVERLAY (shutter feedback) ─────────────────── */
#flash {
  position: fixed; inset: 0;
  background: #fff;
  opacity: 0;
  pointer-events: none;
  z-index: 100;
}
#flash.fire {
  animation: flashPop 0.25s ease forwards;
}
@keyframes flashPop {
  0%   { opacity: 0.6; }
  100% { opacity: 0; }
}

/* ── CAPTURED IMAGE TOAST ─────────────────────────────── */
#capture-toast {
  position: fixed;
  bottom: 180px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(254,253,249,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 14px;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--olive);
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  opacity: 0;
  pointer-events: none;
  z-index: 90;
  transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.32,0.72,0,1);
}
#capture-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div id="app">

  <!-- ── Viewfinder ──────────────────────────────────── -->
  <div id="viewfinder">
    <!-- Camera stream fills here; fallback image if no camera -->
    <video id="camera" autoplay playsinline muted></video>
    <img id="fallback-img" src="https://www.figma.com/api/mcp/asset/6ce759e0-8a2b-41bb-a697-974c5ad9fd24"
         alt="Viewfinder" style="display:none">
    <div class="focus-ring" id="focus-ring"></div>
  </div>

  <!-- ── Bottom controls ─────────────────────────────── -->
  <div id="controls">
    <div id="controls-inner">

      <!-- Import -->
      <div class="ctrl-side" id="btn-import" onclick="history.back()">
        <div class="ctrl-side-circle">
          <img src="https://www.figma.com/api/mcp/asset/f377db88-5c3b-4526-90f2-146c1cf63b18" alt="Import">
        </div>
        <span class="ctrl-side-label">Import</span>
      </div>

      <!-- Shutter -->
      <div class="shutter-wrap" id="btn-shutter">
        <div class="shutter-outer">
          <div class="shutter-inner"></div>
        </div>
      </div>

      <!-- Audio -->
      <div class="ctrl-side" id="btn-audio">
        <div class="ctrl-side-circle"></div>
        <span class="ctrl-side-label">Audio</span>
      </div>

    </div>
  </div>

</div>

<!-- Flash overlay -->
<div id="flash"></div>
<!-- Toast -->
<div id="capture-toast">Photo captured</div>

<script>
// ─── Camera ──────────────────────────────────────────
const video    = document.getElementById('camera');
const fallback = document.getElementById('fallback-img');

(async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' },
      audio: false
    });
    video.srcObject = stream;
  } catch (e) {
    // No camera — show fallback image
    video.style.display = 'none';
    fallback.style.display = 'block';
  }
})();

// ─── Focus ring on tap ────────────────────────────────
const vf   = document.getElementById('viewfinder');
const ring = document.getElementById('focus-ring');

vf.addEventListener('click', e => {
  const rect = vf.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  ring.className = 'focus-ring';
  ring.style.left = x + 'px';
  ring.style.top  = y + 'px';

  // Force reflow then animate
  void ring.offsetWidth;
  ring.classList.add('animate');
  setTimeout(() => ring.classList.add('fade'), 100);
  setTimeout(() => ring.className = 'focus-ring', 1200);
});

// ─── Shutter button ──────────────────────────────────
const shutter = document.getElementById('btn-shutter');
const flash   = document.getElementById('flash');
const toast   = document.getElementById('capture-toast');

shutter.addEventListener('click', () => {
  // Flash feedback
  flash.classList.remove('fire');
  void flash.offsetWidth;
  flash.classList.add('fire');

  // Toast
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);

  // Haptic if available
  if (navigator.vibrate) navigator.vibrate(30);
});
</script>
</body>
</html>
