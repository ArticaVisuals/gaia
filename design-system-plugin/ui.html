<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --ink:   #252024;
    --muted: #7d7981;
    --olive: #67765b;
    --olive-light: #e3e7df;
    --paper: #d7d6d2;
    --border: rgba(0,0,0,0.10);
    --verm:  #b5493a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    padding: 20px;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header { margin-bottom: 20px; }
  .header h1 { font-size: 20px; font-weight: 700; line-height: 1.2; }
  .header p  { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

  /* ── Section ── */
  .section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 8px; margin-top: 20px;
  }

  /* ── Option rows ── */
  .options { display: flex; flex-direction: column; gap: 2px; }
  .option  {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px; cursor: pointer;
    transition: background 0.12s;
    -webkit-user-select: none; user-select: none;
  }
  .option:hover { background: rgba(103,118,91,0.10); }
  .option input  { width: 16px; height: 16px; accent-color: var(--olive); flex-shrink: 0; cursor: pointer; }
  .option label  { flex: 1; cursor: pointer; font-size: 14px; }
  .badge {
    font-size: 10px; color: var(--muted);
    background: var(--olive-light); padding: 2px 8px;
    border-radius: 100px; white-space: nowrap;
  }

  /* ── Divider ── */
  hr { border: none; border-top: 1px solid rgba(0,0,0,0.08); margin: 16px 0 4px; }

  /* ── Select / Deselect ── */
  .toggleRow { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 4px; }
  .link { font-size: 11px; color: var(--olive); cursor: pointer; text-decoration: underline; opacity: 0.7; }
  .link:hover { opacity: 1; }

  /* ── Button ── */
  .btn {
    width: 100%; padding: 14px;
    border-radius: 14px; border: none;
    background: var(--olive); color: #fefdf9;
    font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 16px;
    transition: background 0.15s, opacity 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:hover:not(:disabled)  { background: #5b6a50; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Status ── */
  .status {
    margin-top: 12px; padding: 12px 14px;
    border-radius: 12px; font-size: 13px;
    display: none; align-items: center; gap: 10px;
    background: var(--olive-light); color: #3e4d35;
  }
  .status.visible { display: flex; }
  .status.done    { background: rgba(103,118,91,0.18); }
  .status.error   { background: rgba(181,73,58,0.10); color: var(--verm); }

  /* ── Spinner ── */
  .spinner {
    width: 14px; height: 14px; flex-shrink: 0;
    border: 2.5px solid rgba(103,118,91,0.3);
    border-top-color: var(--olive);
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner.hidden { display: none; }

  /* ── Progress bar ── */
  .progress-wrap {
    height: 3px; border-radius: 100px;
    background: rgba(103,118,91,0.15);
    margin-top: 10px; overflow: hidden;
    display: none;
  }
  .progress-wrap.visible { display: block; }
  .progress-bar {
    height: 100%; width: 0%; border-radius: 100px;
    background: var(--olive);
    transition: width 0.3s ease;
  }

  /* ── Counts row ── */
  .counts {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 12px;
  }
  .count-chip {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--muted);
    background: rgba(0,0,0,0.04);
    padding: 4px 10px; border-radius: 100px;
  }
  .count-chip .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--olive); opacity: 0.6;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Design System Generator</h1>
  <p>Reads all variables, styles & components from this file and lays them out on a new <em>🎨 Design System</em> page.</p>
</div>

<div class="counts" id="countChips">
  <div class="count-chip"><div class="dot"></div><span id="chipVars">– vars</span></div>
  <div class="count-chip"><div class="dot"></div><span id="chipColors">– color styles</span></div>
  <div class="count-chip"><div class="dot"></div><span id="chipText">– text styles</span></div>
  <div class="count-chip"><div class="dot"></div><span id="chipEffects">– effects</span></div>
  <div class="count-chip"><div class="dot"></div><span id="chipComps">– components</span></div>
</div>

<hr>
<p class="section-title">Include in output</p>

<div class="toggleRow">
  <span class="link" id="selectAll">Select all</span>
  <span class="link" id="deselectAll">Deselect all</span>
</div>

<div class="options">
  <label class="option">
    <input type="checkbox" id="chk-variables" checked>
    <span class="label-text">Variables</span>
    <span class="badge" id="badge-variables">–</span>
  </label>
  <label class="option">
    <input type="checkbox" id="chk-colorStyles" checked>
    <span class="label-text">Color Styles</span>
    <span class="badge" id="badge-colorStyles">–</span>
  </label>
  <label class="option">
    <input type="checkbox" id="chk-textStyles" checked>
    <span class="label-text">Typography</span>
    <span class="badge" id="badge-textStyles">–</span>
  </label>
  <label class="option">
    <input type="checkbox" id="chk-effectStyles" checked>
    <span class="label-text">Effects & Shadows</span>
    <span class="badge" id="badge-effectStyles">–</span>
  </label>
  <label class="option">
    <input type="checkbox" id="chk-components" checked>
    <span class="label-text">Components</span>
    <span class="badge" id="badge-components">–</span>
  </label>
</div>

<button class="btn" id="genBtn">
  <svg width="16" height="16" fill="none" viewBox="0 0 16 16">
    <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </svg>
  Generate Design System Page
</button>

<div class="status" id="status">
  <div class="spinner" id="spinner"></div>
  <span id="statusText">Working…</span>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar" id="progressBar"></div>
</div>

<script>
  const STEPS = ['variables','colorStyles','textStyles','effectStyles','components'];
  let progress = 0;

  window.onload = () => {
    parent.postMessage({ pluginMessage: { type: 'getCounts' } }, '*');
  };

  // Select / Deselect all
  document.getElementById('selectAll').onclick = () =>
    STEPS.forEach(id => { document.getElementById('chk-' + id).checked = true; });
  document.getElementById('deselectAll').onclick = () =>
    STEPS.forEach(id => { document.getElementById('chk-' + id).checked = false; });

  // Generate
  document.getElementById('genBtn').addEventListener('click', () => {
    const opts = {};
    STEPS.forEach(id => { opts[id] = document.getElementById('chk-' + id).checked; });

    progress = 0;
    setStatus('Starting…', false);
    setProgress(5);
    document.getElementById('genBtn').disabled = true;
    parent.postMessage({ pluginMessage: { type: 'generate', options: opts } }, '*');
  });

  window.onmessage = e => {
    const msg = e.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'counts') {
      document.getElementById('chipVars').textContent    = msg.variables    + ' vars';
      document.getElementById('chipColors').textContent  = msg.colorStyles  + ' color styles';
      document.getElementById('chipText').textContent    = msg.textStyles   + ' text styles';
      document.getElementById('chipEffects').textContent = msg.effectStyles + ' effects';
      document.getElementById('chipComps').textContent   = msg.components   + ' components';

      document.getElementById('badge-variables').textContent    = msg.variables    + ' vars';
      document.getElementById('badge-colorStyles').textContent  = msg.colorStyles  + ' styles';
      document.getElementById('badge-textStyles').textContent   = msg.textStyles   + ' styles';
      document.getElementById('badge-effectStyles').textContent = msg.effectStyles + ' effects';
      document.getElementById('badge-components').textContent   = msg.components   + ' comps';
    }

    if (msg.type === 'status') {
      setStatus(msg.text, false);
      progress = Math.min(progress + 18, 90);
      setProgress(progress);
    }

    if (msg.type === 'done') {
      setStatus('✓ Design System page created! Navigate to it in the Pages panel.', true);
      setProgress(100);
      document.getElementById('spinner').classList.add('hidden');
      document.getElementById('genBtn').disabled = false;
    }

    if (msg.type === 'error') {
      setStatus('Error: ' + msg.text, false, true);
      setProgress(0);
      document.getElementById('spinner').classList.add('hidden');
      document.getElementById('genBtn').disabled = false;
    }
  };

  function setStatus(text, done, err = false) {
    const el = document.getElementById('status');
    el.className = 'status visible' + (done ? ' done' : '') + (err ? ' error' : '');
    document.getElementById('statusText').textContent = text;
    const sp = document.getElementById('spinner');
    sp.classList.toggle('hidden', done || err);
  }

  function setProgress(pct) {
    const wrap = document.getElementById('progressWrap');
    const bar  = document.getElementById('progressBar');
    wrap.classList.toggle('visible', pct > 0 && pct < 100);
    bar.style.width = pct + '%';
  }
</script>
</body>
</html>
