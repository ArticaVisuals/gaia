name: GaiaNative
options:
  defaultConfig: Debug
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: GaiaNative
    PRODUCT_BUNDLE_IDENTIFIER: com.gaia.prototype.native
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Gaia
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
    INFOPLIST_KEY_NSCameraUsageDescription: Gaia uses the camera to observe living things.
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    TARGETED_DEVICE_FAMILY: "1"
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_PREVIEWS: NO
    DEVELOPMENT_TEAM: ""
targets:
  GaiaNative:
    type: application
    platform: iOS
    sources:
      - path: GaiaNative
        excludes:
          - README.md
          - Content/**
          - Resources/**
      - path: GaiaNative/Content
        buildPhase: resources
        type: folder
      - path: GaiaNative/Resources
        buildPhase: resources
        type: folder
      - path: assets
        buildPhase: resources
        type: folder
    settings:
      base:
        DEVELOPMENT_ASSET_PATHS: GaiaNative/PreviewData
schemes:
  GaiaNative:
    build:
      targets:
        GaiaNative: all
    run:
      config: Debug
    archive:
      config: Release
