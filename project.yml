name: GaiaNative
options:
  defaultConfig: Debug
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: GaiaNative
    PRODUCT_BUNDLE_IDENTIFIER: com.gaia.prototype.native
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: Gaia
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.education
    INFOPLIST_KEY_NSCameraUsageDescription: Gaia uses the camera to observe living things.
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Gaia uses your location to center the map and show nearby finds.
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: NO
    DEVELOPMENT_TEAM: ""
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": YES
    "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": YES
packages:
  MapboxMaps:
    url: https://github.com/mapbox/mapbox-maps-ios.git
    exactVersion: 11.20.2
targets:
  GaiaNative:
    type: application
    platform: iOS
    sources:
      - path: GaiaNative
        excludes:
          - README.md
          - Content/**
          - Resources/**
      - path: GaiaNative/Content
        buildPhase: resources
        type: folder
      - path: GaiaNative/Resources/Fonts
        buildPhase: resources
        type: folder
      - path: GaiaNative/Resources/Assets.xcassets
        buildPhase: resources
      - path: GaiaNative/Resources/Icons
        buildPhase: resources
        type: folder
      - path: assets
        buildPhase: resources
        type: folder
    settings:
      base:
        DEVELOPMENT_ASSET_PATHS: GaiaNative/PreviewData
    dependencies:
      - package: MapboxMaps
schemes:
  GaiaNative:
    build:
      targets:
        GaiaNative: all
    run:
      config: Debug
    archive:
      config: Release
